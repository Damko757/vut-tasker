services:
  web:
    container_name: vut-tasker-web
    build:
      context: ./
      dockerfile: ./web/Dockerfile
    # image: nginx:latest
    volumes:
      # - ./web/dist:/usr/share/nginx/html
      - ./web/default.conf:/etc/nginx/conf.d/default.conf
      # environment:
      # - NGINX_PORT=80
    networks:
      servers-network:
        ipv4_address: 192.168.0.202
    ports:
      - 80:80
    restart: unless-stopped
  api:
    tty: true
    depends_on:
      - mongodb
    container_name: vut-tasker-api
    build:
      dockerfile: ./server/Dockerfile
      context: ./
    ports:
      - 3000:3000
    volumes:
      - ./server/traffic.log:/usr/src/app/traffic.log
      - ./server/src:/usr/src/app/src
      - ./shared:/usr/src/shared
      - ./.env:/usr/src/.env
    restart: unless-stopped
    networks:
      servers-network:
        ipv4_address: 192.168.0.203
      # vut-tasker-prod-network:
  mongodb:
    container_name: vut-tasker-prod-mongodb
    image: mongo
    restart: unless-stopped
    ports:
      - ${DATABASE_PORT}:27017
    volumes:
      - ./mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DATABASE_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      servers-network:
        ipv4_address: 192.168.0.204
      # vut-tasker-prod-network:
  cloudflare:
    restart: unless-stopped
    container_name: vut-tasker-prod-cloudflare
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiMjgwN2ZmYzk3NDBjZWE0YjQ0NTFmNzUxMjY3MWJhYmUiLCJ0IjoiNDZiNWY3MDAtMzM1YS00MjVkLWIwYTktZDQxMjNjODM1OTdiIiwicyI6Ik1XUTJZVFUzWVRrdE1tVTJaQzAwTXpNNExUazNNamN0TWpabVlUUXlZalE1T1dWayJ9
    networks:
      servers-network:
        ipv4_address: 192.168.0.201
